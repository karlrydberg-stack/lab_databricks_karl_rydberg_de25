bundle:
  name: marathos

targets:
  dev:
    mode: development
    default: true

resources:
  jobs:
    marathos_pipeline:
      name: marathos_pipeline
      tasks:
        - task_key: setup_catlog
          notebook_task: 
            notebook_path: ./setup/create_catalog.py
        - task_key: bronze
          depends_on: [{task_key: setup_catalog}]
          spark_python_task:
            python_file: ./transformations/bronze/raw_marathos.py